<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Barbearia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">✂️</div>
      <h1 class="auth-title">Criar conta</h1>
    </div>

    <div class="auth-body">
      <div id="registerMsg" class="auth-msg auth-msg--error"></div>

      <form onsubmit="return registerUser(event)">
        <label class="auth-label" for="regLogin">Usuário</label>
        <input class="auth-input" type="text" id="regLogin" placeholder="Escolha um usuário" autocomplete="username" required>

        <label class="auth-label" for="regEmail">E-mail</label>
        <input class="auth-input" type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email" required>

        <label class="auth-label" for="regPass">Senha</label>
        <input class="auth-input" type="password" id="regPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>

        <button class="auth-btn" type="submit">Criar conta</button>
      </form>
    </div>

    <div class="auth-footer">
      <a class="auth-link" href="login.html">Já tem conta? <strong>Entrar</strong></a>
    </div>

  </div>

  <script>
    async function registerUser(e) {
      e.preventDefault();
      const login = document.getElementById('regLogin').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const senha = document.getElementById('regPass').value.trim();
      const msgDiv = document.getElementById('registerMsg');
      msgDiv.style.display = 'none';
      msgDiv.className = 'auth-msg auth-msg--error';

      if (!login || !email || !senha) {
        msgDiv.textContent = 'Preencha todos os campos!';
        msgDiv.style.display = 'block';
        return false;
      }

      try {
        const res = await fetch('/api/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, email, senha })
        });
        const data = await res.json();
        if (res.ok) {
          msgDiv.className = 'auth-msg auth-msg--success';
          msgDiv.textContent = data.message || 'Usuário registrado com sucesso!';
          msgDiv.style.display = 'block';
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          msgDiv.textContent = data.error || 'Erro ao registrar usuário';
          msgDiv.style.display = 'block';
        }
      } catch {
        msgDiv.textContent = 'Erro ao conectar com o servidor.';
        msgDiv.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
