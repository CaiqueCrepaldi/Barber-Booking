<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuário</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .register-container { max-width: 350px; margin: 80px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 10px #0001; padding: 32px; }
    .register-title { text-align: center; margin-bottom: 32px; color: #1a1a1a; }
    .register-form label { font-weight: 600; }
    .register-form input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border-radius: 5px; border: 1px solid #ccc; }
    .register-form button { width: 100%; padding: 12px; background: #d4af37; color: #1a1a1a; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .register-form button:hover { background: #f0c547; }
    .register-error { color: #b00; text-align: center; margin-bottom: 10px; }
    .register-success { color: #155724; background: #d4edda; border: 1px solid #c3e6cb; text-align: center; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="register-container">
    <h2 class="register-title">Registro de Usuário</h2>
    <div id="registerMsg" class="register-error" style="display:none;"></div>
    <form class="register-form" onsubmit="return registerUser(event)">
      <label for="regLogin">Login</label>
      <input type="text" id="regLogin" placeholder="Login" required>
      <label for="regEmail">E-mail</label>
      <input type="email" id="regEmail" placeholder="E-mail" required>
      <label for="regPass">Senha</label>
      <input type="password" id="regPass" placeholder="Senha" required>
      <button type="submit">Registrar</button>
    </form>
  </div>
  <script>
    async function registerUser(e) {
      e.preventDefault();
      const login = document.getElementById('regLogin').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const senha = document.getElementById('regPass').value.trim();
      const msgDiv = document.getElementById('registerMsg');
      msgDiv.style.display = 'none';
      msgDiv.className = 'register-error';
      if (!login || !email || !senha) {
        msgDiv.textContent = 'Preencha todos os campos!';
        msgDiv.style.display = 'block';
        return false;
      }
      try {
        const res = await fetch('/api/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, email, senha })
        });
        const data = await res.json();
        if (res.ok) {
          msgDiv.className = 'register-success';
          msgDiv.textContent = data.message || 'Usuário registrado com sucesso!';
          msgDiv.style.display = 'block';
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          msgDiv.textContent = data.error || 'Erro ao registrar usuário';
          msgDiv.style.display = 'block';
        }
      } catch (err) {
        msgDiv.textContent = 'Erro ao conectar com o servidor.';
        msgDiv.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
