<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Agendamentos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 10px #0001; padding: 32px; }
    .admin-title { text-align: center; margin-bottom: 32px; color: #1a1a1a; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
    .admin-table th, .admin-table td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: left; }
    .admin-table th { background: #f5f5f5; color: #1a1a1a; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-login { max-width: 350px; margin: 60px auto; background: #fafafa; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
    .admin-login label { font-weight: 600; }
    .admin-login input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border-radius: 5px; border: 1px solid #ccc; }
    .admin-login button { width: 100%; padding: 12px; background: #d4af37; color: #1a1a1a; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .admin-login button:hover { background: #f0c547; }
    .admin-error { color: #b00; text-align: center; margin-bottom: 10px; }
    .btn-logout-admin { margin-bottom: 16px; padding: 8px 18px; background: #c0392b; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-logout-admin:hover { background: #e74c3c; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo">&#9986;&#65039; Barbearia</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#servicos">Serviços</a></li>
          <li><a href="index.html#agendar">Agendar</a></li>
          <li><a href="index.html#contato">Contato</a></li>
          <li id="nav-login"><a href="login.html">Login</a></li>
          <li id="nav-agendamentos" style="display:none;"><a href="meus-agendamentos.html">Meus Agendamentos</a></li>
          <li id="nav-logout" style="display:none;"><a href="#" onclick="logoutUser();return false;">Logout</a></li>
          <script>
            async function checkSessionNavbar() {
              const res = await fetch('/api/session');
              const data = await res.json();
              const navLogin = document.getElementById('nav-login');
              const navAg = document.getElementById('nav-agendamentos');
              const navLogout = document.getElementById('nav-logout');
              if (data.loggedIn) {
                navLogin.style.display = 'none';
                navAg.style.display = '';
                navLogout.style.display = '';
              } else {
                navLogin.style.display = '';
                navAg.style.display = 'none';
                navLogout.style.display = 'none';
              }
            }
            checkSessionNavbar();
            window.logoutUser = async function() {
              await fetch('/api/logout', { method: 'POST' });
              window.location.href = 'index.html';
            };
          </script>
        </ul>
      </nav>
    </div>
  </header>

  <div id="loginSection" class="admin-login">
    <h2>Painel do Administrador</h2>
    <div id="loginError" class="admin-error" style="display:none;"></div>
    <label for="adminUser">Usuário</label>
    <input type="text" id="adminUser" placeholder="Usuário" required autocomplete="username">
    <label for="adminPass">Senha</label>
    <input type="password" id="adminPass" placeholder="Senha" required autocomplete="current-password">
    <button onclick="loginAdmin()">Entrar</button>
  </div>

  <div id="adminPanel" class="admin-container" style="display:none;">
    <button class="btn-logout-admin" onclick="logoutAdmin()">Sair do painel</button>
    <h1 class="admin-title">Agendamentos Recebidos</h1>
    <table class="admin-table" id="agendamentosTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Data</th>
          <th>Horário</th>
          <th>Serviço</th>
          <th>Agendado em</th>
        </tr>
      </thead>
      <tbody id="agendamentosBody"></tbody>
    </table>
  </div>

  <script>
    // Verifica se já está autenticado como admin ao carregar a página
    async function checkAdminSession() {
      const res = await fetch('/api/admin/session');
      const data = await res.json();
      if (data.loggedIn) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        carregarAgendamentos();
      }
    }
    checkAdminSession();

    async function loginAdmin() {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value.trim();
      const errorDiv = document.getElementById('loginError');
      errorDiv.style.display = 'none';

      if (!user || !pass) {
        errorDiv.textContent = 'Preencha usuário e senha.';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: user, senha: pass })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          carregarAgendamentos();
        } else {
          errorDiv.textContent = data.error || 'Usuário ou senha inválidos!';
          errorDiv.style.display = 'block';
        }
      } catch {
        errorDiv.textContent = 'Erro de conexão. Tente novamente.';
        errorDiv.style.display = 'block';
      }
    }

    async function logoutAdmin() {
      await fetch('/api/admin/logout', { method: 'POST' });
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str != null ? String(str) : ''));
      return div.innerHTML;
    }

    function carregarAgendamentos() {
      fetch('/admin/agendamentos')
        .then(res => {
          if (res.status === 401) {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            return null;
          }
          return res.json();
        })
        .then(agendamentos => {
          if (!agendamentos) return;
          const tbody = document.getElementById('agendamentosBody');
          tbody.innerHTML = '';
          if (agendamentos.length === 0) {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = 6;
            td.style.textAlign = 'center';
            td.textContent = 'Nenhum agendamento encontrado.';
            tr.appendChild(td);
            tbody.appendChild(tr);
            return;
          }
          agendamentos.forEach(ag => {
            const tr = document.createElement('tr');
            const campos = [
              ag.nome,
              ag.telefone,
              formatarData(ag.data),
              ag.horario,
              ag.servico,
              formatarDataHora(ag.created_at)
            ];
            campos.forEach(valor => {
              const td = document.createElement('td');
              td.textContent = valor != null ? String(valor) : '';
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
        })
        .catch(() => {
          const tbody = document.getElementById('agendamentosBody');
          tbody.innerHTML = '';
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 6;
          td.style.color = '#b00';
          td.style.textAlign = 'center';
          td.textContent = 'Erro ao carregar agendamentos.';
          tr.appendChild(td);
          tbody.appendChild(tr);
        });
    }

    function formatarData(dataStr) {
      if (!dataStr) return '';
      const d = new Date(dataStr);
      if (isNaN(d)) return String(dataStr);
      return d.toLocaleDateString('pt-BR');
    }

    function formatarDataHora(dataStr) {
      if (!dataStr) return '';
      const d = new Date(dataStr);
      if (isNaN(d)) return String(dataStr);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR').slice(0, 5);
    }

    // Permite envio com Enter nos campos de login
    document.getElementById('adminPass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loginAdmin();
    });
    document.getElementById('adminUser').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loginAdmin();
    });
  </script>
</body>
</html>
