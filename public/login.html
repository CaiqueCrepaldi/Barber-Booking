<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barbearia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">✂️</div>
      <h1 class="auth-title">Entrar na conta</h1>
    </div>

    <div class="auth-body">
      <div id="loginError" class="auth-msg auth-msg--error"></div>

      <form onsubmit="return loginUser(event)">
        <label class="auth-label" for="userLogin">Usuário</label>
        <input class="auth-input" type="text" id="userLogin" placeholder="Seu usuário" autocomplete="username" required>

        <label class="auth-label" for="userPass">Senha</label>
        <input class="auth-input" type="password" id="userPass" placeholder="Sua senha" autocomplete="current-password" required>

        <button class="auth-btn" type="submit">Entrar</button>
      </form>
    </div>

    <div class="auth-footer">
      <a class="auth-link" href="registro.html">Não tem conta? <strong>Registre-se</strong></a>
      <a class="auth-link" href="forgot-password.html">Esqueci minha senha</a>
    </div>

  </div>

  <script>
    async function loginUser(e) {
      e.preventDefault();
      const user = document.getElementById('userLogin').value.trim();
      const pass = document.getElementById('userPass').value.trim();
      const errorDiv = document.getElementById('loginError');
      errorDiv.style.display = 'none';

      if (!user || !pass) {
        errorDiv.textContent = 'Preencha login e senha!';
        errorDiv.style.display = 'block';
        return false;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: user, senha: pass })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = user === 'admin' ? 'admin.html' : 'index.html';
        } else {
          errorDiv.textContent = data.error || 'Usuário ou senha inválidos!';
          errorDiv.style.display = 'block';
        }
      } catch {
        errorDiv.textContent = 'Erro ao conectar com o servidor.';
        errorDiv.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
